<!doctype html><html><head><meta charset='utf-8'/><meta name='viewport' content='width=device-width,initial-scale=1'/><title>World Cup Goal Density Explorer</title><script src='https://cdn.tailwindcss.com'></script><script src='https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js'></script><script src='https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6/+esm' type='module'></script><link rel='stylesheet' href='style.css'/></head>
<body class='bg-slate-950 text-slate-100 min-h-screen'><main class='max-w-7xl mx-auto p-4 md:p-8'>
<header class='mb-6'><h1 class='text-3xl font-bold'>World Cup Goal Density Explorer</h1><p class='text-slate-300'>Every men’s World Cup goal, plotted by match minute and tournament year.</p><p class='text-slate-400 mt-2 italic'>Football has a rhythm. This chart shows where goals cluster, when pressure spikes, and how stoppage time changed the shape of the game.</p></header>
<div class='grid md:grid-cols-12 gap-4'><aside class='md:col-span-3 card p-4' id='controls'></aside><section class='md:col-span-9 space-y-4'><div class='card p-3'><div id='viewToggle' class='mb-2'><button data-view='scatter' class='toggle active'>Goals scatter</button><button data-view='heatmap' class='toggle'>Density heatmap</button></div><div id='plot'></div></div><div id='summary' class='grid grid-cols-2 md:grid-cols-4 gap-3'></div><div class='card p-4 text-slate-300' id='interpretation'></div></section></div></main><script type='module' src='src/main.js'></script></body></html>
